<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Guide</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }
    .section {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }
    .slider {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      margin: 15px 0;
    }
    .slider img {
      width: 260px;
      height: 260px;
      object-fit: cover;
      border-radius: 12px;
      flex-shrink: 0;
    }
    .prompt {
      background: #f2f2f2;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      direction: ltr;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Art Styles Guide</h1>

    <div class="section">
      <h2>Surrealism</h2>
      <div class="slider">
        <img src="https://upload.wikimedia.org/wikipedia/en/d/dd/The_Persistence_of_Memory.jpg" alt="Surrealism example 1">
        <img src="https://upload.wikimedia.org/wikipedia/en/6/6d/Metamorphosis_of_Narcissus.jpg" alt="Surrealism example 2">
      </div>
      <div class="prompt">Surrealism, dreamlike scene, symbolic imagery, irrational composition</div>
    </div>
  </div>
</body>
</html>
